<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innomine | Home</title>
  <meta name="description" content="Personal web space for Innomine." />
  <link rel="stylesheet" href="assets/site.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="brand">INNOMINE</a>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="/" class="active">Home</a>
          <a href="/contact/">Contact</a>
          <a href="/downloads/">Downloads</a>
        </nav>
      </div>
    </header>

    <main class="home-page">
      <section class="home-hero">
        <div class="home-bg">
          <img src="assets/cover-banner.jpg" alt="Night skyline cover" />
        </div>

        <div class="home-content reveal">
          <p class="section-tag">Personal Domain</p>
          <h1>Innomine</h1>
          <p>
            Main web container ready for future content. The contact hub is already
            separated as an extension of this site.
          </p>

          <div class="home-actions">
            <a href="/contact/" class="action-button">Open Contact</a>
            <a href="/downloads/" class="action-button secondary">Downloads</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>© 2026 Innomine.</p>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/contact/">Contact</a>
          <a href="/downloads/">Downloads</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="assets/site.js"></script>
</body>
</html>
